name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Static quality gates (lint, type, build)
  # ─────────────────────────────────────────────
  quality:
    name: Lint · Typecheck · Unit Tests · Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shackles_test
        ports:
          - 5432:5432
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify lockfile integrity
        run: npm audit signatures
        continue-on-error: true  # Don't block CI on signature issues

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Cache node_modules for downstream jobs
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Ensure Prisma migrations folder exists
        run: |
          if [ ! -d prisma/migrations ]; then
            echo "Missing prisma/migrations. Run 'npx prisma migrate dev --name baseline' and commit."
            exit 1
          fi

      - name: Migration drift check
        run: npm run db:drift:check
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shackles_test

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shackles_test

      - name: Unit & Integration Tests
        run: npx vitest run --coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shackles_test
          SESSION_SECRET: ci-test-session-secret-32-characters-x
          ACTIVE_YEAR: "2026"
          ACTIVE_THEME_KEY: default
          ACTIVE_PUBLIC_DOMAIN: localhost
          STORAGE_PROVIDER: local

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shackles_test
          SESSION_SECRET: ci-build-session-secret-32-characters
          ACTIVE_YEAR: "2026"
          ACTIVE_THEME_KEY: default
          ACTIVE_PUBLIC_DOMAIN: localhost
          STORAGE_PROVIDER: local

  # ─────────────────────────────────────────────
  # Job 2: Playwright E2E (runs on PRs + main push)
  # Skipped on dev pushes to keep feedback fast.
  # ─────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shackles_e2e
        ports:
          - 5432:5432
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore node_modules from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies (cache miss fallback)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shackles_e2e

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: "true"
          PLAYWRIGHT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shackles_e2e
          PLAYWRIGHT_SESSION_SECRET: ci-e2e-session-secret-32-characters-xx
          ACTIVE_YEAR: "2026"
          ACTIVE_THEME_KEY: default
          ACTIVE_PUBLIC_DOMAIN: localhost
          STORAGE_PROVIDER: local
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
