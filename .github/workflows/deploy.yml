name: Deploy

# Trigger: only after the CI workflow succeeds on main.
# This ensures we never deploy a build that hasn't passed lint, typecheck,
# tests, migration drift check, and governance gates.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    # Skip if the triggering CI run failed or was cancelled.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    steps:
      # --------------------------------------------------------
      # 1. Source
      # --------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Check out the commit that triggered the CI run, not HEAD.
          ref: ${{ github.event.workflow_run.head_sha }}

      # --------------------------------------------------------
      # 2. DigitalOcean CLI
      # --------------------------------------------------------
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Authenticate with DO Container Registry
        run: doctl registry login --expiry-seconds 1200



      # --------------------------------------------------------
      # 4. Docker build + push (App and Worker)
      # --------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web App
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/shackles-next:${{ github.event.workflow_run.head_sha }}
            registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/shackles-next:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push Worker
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/shackles-worker:${{ github.event.workflow_run.head_sha }}
            registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/shackles-worker:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # --------------------------------------------------------
      # 5. Trigger DigitalOcean App Platform redeploy
      # --------------------------------------------------------
      - name: Get Previous Deployment ID
        id: prev_deployment
        run: |
          PREV_ID=$(curl -sf -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" "https://api.digitalocean.com/v2/apps/${{ vars.DO_APP_ID }}/deployments" | jq -r '.deployments | map(select(.phase == "ACTIVE" or .phase == "SUPERSEDED")) | .[0].id')
          echo "PREV_DEPLOYMENT_ID=$PREV_ID" >> $GITHUB_ENV

      - name: Trigger App Platform deployment
        id: trigger_deploy
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/apps/${{ vars.DO_APP_ID }}/deployments"

      - name: Wait for Deployment and Healthcheck
        run: |
          echo "Polling DO App Platform for deployment status..."
          for i in {1..40}; do
            APP_INFO=$(curl -sf -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" "https://api.digitalocean.com/v2/apps/${{ vars.DO_APP_ID }}")
            IN_PROGRESS=$(echo $APP_INFO | jq -r '.app.in_progress')
            if [ "$IN_PROGRESS" = "false" ]; then
              echo "Deployment finished."
              LATEST_PHASE=$(curl -sf -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" "https://api.digitalocean.com/v2/apps/${{ vars.DO_APP_ID }}/deployments" | jq -r '.deployments[0].phase')
              if [ "$LATEST_PHASE" = "ERROR" ] || [ "$LATEST_PHASE" = "FAILED" ] || [ "$LATEST_PHASE" = "CANCELED" ]; then
                echo "Deployment finished with phase: $LATEST_PHASE"
                exit 1
              fi
              echo "Deployment finished with phase: $LATEST_PHASE"
              exit 0
            fi
            sleep 15
          done
          echo "Deployment timed out."
          exit 1

      - name: Rollback on Failure
        if: failure() && steps.trigger_deploy.outcome == 'success'
        run: |
          echo "Rolling back to previous deployment ${PREV_DEPLOYMENT_ID}..."
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"deployment_id\": \"${{ env.PREV_DEPLOYMENT_ID }}\"}" \
            "https://api.digitalocean.com/v2/apps/${{ vars.DO_APP_ID }}/rollback"

      # --------------------------------------------------------
      # 5. Deployment summary
      # --------------------------------------------------------
      - name: Deployment summary
        if: success()
        run: |
          echo "### Deployment triggered ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**App Image:** registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/shackles-next:${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Worker Image:** registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/shackles-worker:${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**App ID:** ${{ vars.DO_APP_ID }}" >> $GITHUB_STEP_SUMMARY
