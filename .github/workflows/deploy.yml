name: Deploy

# Trigger: only after the CI workflow succeeds on main.
# This ensures we never deploy a build that hasn't passed lint, typecheck,
# tests, migration drift check, and governance gates.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    # Skip if the triggering CI run failed or was cancelled.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    steps:
      # --------------------------------------------------------
      # 1. Source
      # --------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Check out the commit that triggered the CI run, not HEAD.
          ref: ${{ github.event.workflow_run.head_sha }}

      # --------------------------------------------------------
      # 2. DigitalOcean CLI
      # --------------------------------------------------------
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Authenticate with DO Container Registry
        run: doctl registry login --expiry-seconds 1200

      # --------------------------------------------------------
      # 3. Docker build + push
      # --------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tag with the exact commit SHA (for rollback) and 'latest'
          tags: |
            registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/shackles-next:${{ github.event.workflow_run.head_sha }}
            registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/shackles-next:latest
          # GitHub Actions layer cache — keeps subsequent builds fast
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # --------------------------------------------------------
      # 4. Run Database Migrations
      # --------------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Apply Database Migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # --------------------------------------------------------
      # 5. Trigger DigitalOcean App Platform redeploy
      # --------------------------------------------------------
      - name: Get Previous Deployment ID
        id: prev_deployment
        run: |
          PREV_ID=$(curl -sf -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" "https://api.digitalocean.com/v2/apps/${{ vars.DO_APP_ID }}/deployments" | jq -r '.deployments | map(select(.phase == "ACTIVE" or .phase == "SUPERSEDED")) | .[0].id')
          echo "PREV_DEPLOYMENT_ID=$PREV_ID" >> $GITHUB_ENV

      - name: Trigger App Platform deployment
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/apps/${{ vars.DO_APP_ID }}/deployments"

      - name: Wait for Deployment and Healthcheck
        run: |
          echo "Polling DO App Platform for deployment status..."
          for i in {1..40}; do
            STATUS=$(curl -sf -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" "https://api.digitalocean.com/v2/apps/${{ vars.DO_APP_ID }}" | jq -r '.app.in_progress')
            if [ "$STATUS" = "false" ]; then
              echo "Deployment finished."
              exit 0
            fi
            sleep 15
          done
          echo "Deployment timed out."
          exit 1

      - name: Rollback on Failure
        if: failure()
        run: |
          echo "Rolling back to previous deployment ${PREV_DEPLOYMENT_ID}..."
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"deployment_id\": \"${{ env.PREV_DEPLOYMENT_ID }}\"}" \
            "https://api.digitalocean.com/v2/apps/${{ vars.DO_APP_ID }}/rollback"

      # --------------------------------------------------------
      # 5. Deployment summary
      # --------------------------------------------------------
      - name: Deployment summary
        if: success()
        run: |
          echo "### Deployment triggered ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/shackles-next:${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**App ID:** ${{ vars.DO_APP_ID }}" >> $GITHUB_STEP_SUMMARY
