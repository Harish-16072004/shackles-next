services:
  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: shackles-local-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shackles_local
    ports:
      - "5433:5432"  # Local development port mapping
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Run Prisma migrations automatically
  init-db:
    image: node:20-alpine
    container_name: shackles-init-db
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/shackles_local
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm install && npx prisma migrate dev --name init"

  # Redis cache for rate limiting and caching
  redis:
    image: redis:7-alpine
    container_name: shackles-local-redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Background job workers
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shackles-worker
    command: npx tsx src/worker.ts
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/shackles_local
      - DIRECT_DATABASE_URL=postgresql://postgres:password@db:5432/shackles_local
      - REDIS_URL=redis://redis:6379
      - ACTIVE_YEAR=2026
      - STORAGE_PROVIDER=local
      - DO_SPACES_KEY=${DO_SPACES_KEY}
      - DO_SPACES_SECRET=${DO_SPACES_SECRET}
      - DO_SPACES_ENDPOINT=${DO_SPACES_ENDPOINT}
      - DO_SPACES_BUCKET=${DO_SPACES_BUCKET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Main Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shackles-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/shackles_local
      - DIRECT_DATABASE_URL=postgresql://postgres:password@db:5432/shackles_local
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - ACTIVE_YEAR=2026
      - STORAGE_PROVIDER=local
      - DO_SPACES_KEY=${DO_SPACES_KEY}
      - DO_SPACES_SECRET=${DO_SPACES_SECRET}
      - DO_SPACES_ENDPOINT=${DO_SPACES_ENDPOINT}
      - DO_SPACES_BUCKET=${DO_SPACES_BUCKET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: