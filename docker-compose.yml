version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: shackles-local-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shackles_local
    ports:
      - "5433:5432"  # <--- CHANGE THIS LINE (Left side is 5433)
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: