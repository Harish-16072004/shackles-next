# Add these services to your existing docker-compose.yml
# They sit alongside your Next.js app and Postgres services.

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes   # persist job data across restarts
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile          # same Dockerfile as your Next.js app
    command: node dist/worker.js      # runs worker.ts compiled output
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - DO_SPACES_ENDPOINT=${DO_SPACES_ENDPOINT}
      - DO_SPACES_KEY=${DO_SPACES_KEY}
      - DO_SPACES_SECRET=${DO_SPACES_SECRET}
      - DO_SPACES_BUCKET=${DO_SPACES_BUCKET}
      - DO_SPACES_CDN_URL=${DO_SPACES_CDN_URL}
      - QR_ENCRYPTION_KEY=${QR_ENCRYPTION_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G    # Puppeteer (ID cards) is memory-hungry

  # Your existing Next.js service — add REDIS_URL
  app:
    environment:
      - REDIS_URL=redis://redis:6379  # add this line to existing env block

volumes:
  redis_data:
