<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111827" />
  <title>Shackles Symposium — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text:    #e2e8f0;
      --muted:   #94a3b8;
      --accent:  #6366f1;
      --radius:  0.75rem;
    }

    html, body {
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      opacity: 0.9;
    }

    h1 {
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    p {
      font-size: 0.9375rem;
      color: var(--muted);
      line-height: 1.6;
      max-width: 34ch;
      margin: 0 auto 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 500;
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 120ms ease;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { opacity: 0.7; }

    .status {
      margin-top: 1.5rem;
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 0.4rem;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Cloud-off SVG icon -->
    <svg class="icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="32" cy="32" r="32" fill="#1e2235"/>
      <path d="M44 38a7 7 0 0 0-3.17-13.19A12 12 0 0 0 20.18 30H20a8 8 0 0 0-1 15.93" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="16" y1="16" x2="48" y2="48" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </svg>

    <h1>You’re offline</h1>
    <p>No internet connection detected. Some features may be unavailable until you reconnect.</p>

    <button class="btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
      Try again
    </button>

    <p class="status">
      <span class="dot" aria-hidden="true"></span>
      Waiting for connection…
    </p>
  </div>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
